<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educanautas - Inicio</title>
    <link rel="stylesheet" href="home.css">
    <!-- Fuente retro pixel -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Fondo de estrellas con animación CSS -->
    <div class="css-stars"></div>
    <div class="stars"></div>

    <div class="home-container">
        
        <!-- Logo superior izquierdo en pestaña morada -->
        <div class="top-logo-tab">
            <img src="images/home/Logo sin fondo.png" alt="EducaNautas">
        </div>

        <!-- Fila central: Astronautas y Pantalla de bienvenida -->
        <div class="middle-row">
            
            <div class="astronaut female">
                <img src="images/Avatar femenino.png" alt="Astronauta Femenina">
            </div>

            <div class="console-frame">
                <div class="console-screen">
                    <h1>BIENVENIDO A<br>EDUCANAUTAS</h1>
                    <div class="screen-glare"></div>
                </div>
                <div class="console-dots">
                    <span class="dot blue"></span>
                    <span class="dot green"></span>
                    <span class="dot red"></span>
                </div>
            </div>

            <div class="astronaut male">
                <img src="images/Avatar Masculino.png" alt="Astronauta Masculino">
            </div>

        </div>

        <!-- Texto de instrucción -->
        <div class="instruction-text">
            SELECCIONA LA MATERIA QUE DESEA PRACTICAR
        </div>

        <!-- Botones de materias -->
        <div class="subject-buttons">
            <a href="dashboard.html#/matematicas" class="subject-btn">
                <img src="images/home/Mates boton.png" alt="Matemáticas">
            </a>
            <a href="dashboard.html#/lectura" class="subject-btn">
                <img src="images/home/Lectura critica boton.png" alt="Lectura Crítica">
            </a>
            <a href="dashboard.html#/ciencias" class="subject-btn">
                <img src="images/home/Ciencias boton.png" alt="Ciencias">
            </a>
            <a href="dashboard.html#/ciudadanas" class="subject-btn">
                <img src="images/home/Sociales boton.png" alt="Sociales">
            </a>
            <a href="dashboard.html#/ingles" class="subject-btn">
                <img src="images/home/Ingles boton.png" alt="Inglés">
            </a>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencia Espacial ICFES</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body x-data="dashboardData()" x-init="init()" x-cloak>

    <!-- Fondo de estrellas con animación CSS -->
    <div class="css-stars"></div>
    <div class="stars"></div>

    <!-- Botón Hamburguesa -->
    <button class="hamburger-btn" :class="menuAbierto ? 'open-menu' : ''" @click="menuAbierto = !menuAbierto"
        style="transition: left 0.3s ease;">
        <span x-show="!menuAbierto">☰</span>
        <span x-show="menuAbierto">✕</span>
    </button>

    <!-- Barra Lateral (Menú) -->
    <div class="sidebar" :class="menuAbierto ? 'open' : ''">
        <div class="sidebar-header">
            <img src="images/logo.webp" alt="ICFES"
                onerror="this.src='https://via.placeholder.com/100x40/0e1628/ffffff?text=ICFES'">
        </div>
        <ul class="menu-items">
            <template x-for="asignatura in asignaturas" :key="asignatura.id">
                <li :class="asignaturaActiva === asignatura.id ? 'active' : ''"
                    @click="seleccionarAsignatura(asignatura.id)">
                    <img :src="asignatura.icono" alt="Icono" style="width:24px; height:24px"
                        onerror="this.src='https://via.placeholder.com/24x24/ffffff/000000?text=?'">
                    <span x-text="asignatura.nombre"></span>
                </li>
            </template>
        </ul>
    </div>

    <!-- Barra Superior de Progreso -->
    <div class="topbar">
        <div class="progress-container">
            <div class="progress-bar" :style="`width: ${porcentajeProgreso}%`"></div>
        </div>
        <div class="score-badge">
            <span x-text="puntosTotalesMateria"></span>
        </div>
    </div>

    <!-- Mapa Espacial (Scroll Horizontal) -->
    <!-- Un efecto S utilizando transformaciones en Y basadas en un seno -->
    <div class="space-map-container" x-ref="mapContainer" @wheel="manejarScroll($event)">

        <template x-if="cargando">
            <div style="font-size: 2rem;">Cargando Galaxia...</div>
        </template>

        <template x-for="(nodo, index) in rutaCompleta" :key="nodo.id">
            <div class="path-node" :style="`transform: translateY(${Math.sin(index * 0.8) * 150}px)`">

                <!-- Planeta Asignatura Actual -->
                <template x-if="nodo.tipo === 'planeta'">
                    <div class="planet" :style="`background-image: url('${nodo.datos.icono}')`"
                        @click="!nodo.bloqueado && abrirPlaneta(nodo)">
                        <div class="node-title" x-text="nodo.datos.nombre"></div>
                    </div>
                </template>

                <!-- Satélite (Categoría) -->
                <template x-if="nodo.tipo === 'satelite'">
                    <div class="satellite"
                        :class="nodo.bloqueado ? 'locked' : (esCategoriaCompletada(nodo.catIdx) ? 'completed' : '')"
                        :style="`background-image: url('${nodo.datos.imagen}')`"
                        @click="!nodo.bloqueado && abrirCategoria(nodo)">

                        <template x-if="nodo.bloqueado">
                            <div class="lock-icon">🔒</div>
                        </template>
                        <div class="node-title" x-text="nodo.datos.nombre"></div>
                    </div>
                </template>

                <!-- Asteroide (Pregunta) -->
                <template x-if="nodo.tipo === 'asteroide'">
                    <div class="asteroid"
                        :class="[ `color-${index % 4}`, nodo.bloqueado ? 'locked' : (esPreguntaCompletada(nodo.id) ? 'completed' : '') ]"
                        @click="!nodo.bloqueado && abrirPregunta(nodo)">

                        <template x-if="nodo.bloqueado">
                            <div class="lock-icon" style="width:20px; height:20px; font-size:10px;">🔒</div>
                        </template>
                    </div>
                </template>

                <!-- Reto Final (Portal / Agujero de Gusano) -->
                <template x-if="nodo.tipo === 'reto_final'">
                    <div class="satellite reto-final"
                        :class="nodo.bloqueado ? 'locked' : (nodo.completado ? 'completed' : '')"
                        :style="`background-image: url('${nodo.datos.imagen}')`"
                        @click="!nodo.bloqueado && abrirReto(nodo)">
                        <template x-if="nodo.bloqueado">
                            <div class="lock-icon">🔒</div>
                        </template>
                        <div class="node-title" x-text="nodo.datos.nombre" style="color: #ffcc00; font-weight: bold; text-shadow: 0 0 10px #ffcc00;"></div>
                    </div>
                </template>

                <!-- Asteroide de Reto Final -->
                <template x-if="nodo.tipo === 'asteroide_reto'">
                    <div class="asteroid reto-asteroid"
                        :class="[ `color-${index % 4}`, nodo.bloqueado ? 'locked' : (esPreguntaCompletada(nodo.id) ? 'completed' : '') ]"
                        @click="!nodo.bloqueado && abrirPregunta(nodo)" style="border-color: #ffcc00; box-shadow: 0 0 10px #ffcc0055;">
                        <template x-if="nodo.bloqueado">
                            <div class="lock-icon" style="width:20px; height:20px; font-size:10px;">🔒</div>
                        </template>
                    </div>
                </template>

                <!-- Planeta Bloqueado (Próxima Asignatura) -->
                <template x-if="nodo.tipo === 'planeta_bloqueado'">
                    <div class="planet" :class="nodo.bloqueado ? 'locked' : ''"
                        :style="`background-image: url('${nodo.datos.icono}')`"
                        @click="!nodo.bloqueado && avanzarSiguienteMateria(nodo.datos.id)">
                        <template x-if="nodo.bloqueado">
                            <div class="lock-icon">🔒</div>
                        </template>
                        <div class="node-title" x-text="nodo.datos.nombre"></div>
                    </div>
                </template>

                <template x-if="nodo.tipo === 'planeta_final'">
                    <div class="planet" :class="nodo.bloqueado ? 'locked' : 'completed'"
                        style="background-image: url('images/05.webp')">
                        <template x-if="nodo.bloqueado">
                            <div class="lock-icon">🔒</div>
                        </template>
                        <div class="node-title">¡Gran Final!</div>
                    </div>
                </template>

            </div>
        </template>

    </div>

    <!-- ==================== MODALES ==================== -->

    <!-- Modal Info Planeta (Opcional) -->
    <div class="alpine-overlay" x-show="mostrarInfoPlaneta" x-transition>
        <div class="popup" @click.away="mostrarInfoPlaneta = false">
            <a class="close" href="#" @click.prevent="mostrarInfoPlaneta = false">&times;</a>
            <h2 x-text="planetaActivoModal?.nombre"></h2>
            <p x-text="planetaActivoModal?.descripcion"></p>
            <button class="btn-primary" @click="mostrarInfoPlaneta = false">¡Explorar!</button>
        </div>
    </div>

    <!-- Modal Satélite / Categoría -->
    <div class="alpine-overlay" x-show="mostrarCategoriaPopup" x-transition>
        <div class="popup" @click.away="mostrarCategoriaPopup = false">
            <a class="close" href="#" @click.prevent="mostrarCategoriaPopup = false">&times;</a>
            <h2 x-text="categoriaActivaParaModal?.nombre"></h2>
            <p x-text="categoriaActivaParaModal?.descripcion"></p>

            <template x-if="esCategoriaCompletada(catIdxParaModal)">
                <div style="margin-top: 15px; color: #8cc63f; font-weight: bold;">
                    ✅ Ya completaste esta zona de la galaxia.
                </div>
            </template>

            <button class="btn-primary" @click="mostrarCategoriaPopup = false">Continuar</button>
        </div>
    </div>

    <!-- Modal Pregunta -->
    <div class="alpine-overlay" x-show="mostrarPreguntaPopup" x-transition>
        <div class="popup" @click.away="cerrarModalPreguntaPorAway">
            <a class="close" href="#" @click.prevent="cerrarModalPreguntaPorAway">&times;</a>
            <h2 style="font-size: 1.2rem; margin-bottom: 20px;" x-text="preguntaActivaParaModal?.datos.texto"></h2>

            <form @submit.prevent="enviarRespuesta">
                <div class="options-container">
                    <template x-for="opcion in preguntaActivaParaModal?.datos.opciones" :key="opcion.valor">

                        <label class="option-label" :class="{ 
                                  'correct': esPreguntaCompletada(preguntaActivaParaModal?.id) && opcion.valor === preguntaActivaParaModal?.datos.respuestaCorrecta,
                                  'incorrect': esPreguntaCompletada(preguntaActivaParaModal?.id) && respuestaSeleccionada === opcion.valor && opcion.valor !== preguntaActivaParaModal?.datos.respuestaCorrecta
                               }">
                            <input type="radio" name="opcion" :value="opcion.valor" x-model="respuestaSeleccionada"
                                :disabled="esPreguntaCompletada(preguntaActivaParaModal?.id)">
                            <span x-text="opcion.texto"></span>
                        </label>

                    </template>
                </div>

                <template
                    x-if="esPreguntaCompletada(preguntaActivaParaModal?.id) && respuestasUsuario[preguntaActivaParaModal?.id]?.esCorrecta === false">
                    <div
                        style="margin-top: 15px; padding: 10px; background: rgba(255, 60, 60, 0.1); border-left: 4px solid #ff3c3c; border-radius: 4px; text-align: left;">
                        <strong style="color: #ff3c3c; display: block; margin-bottom: 5px;">Explicación:</strong>
                        <span style="color: #ddd;" x-text="preguntaActivaParaModal?.datos.explicacion"></span>
                    </div>
                </template>

                <div style="text-align: right; margin-top: 15px;">
                    <template x-if="!esPreguntaCompletada(preguntaActivaParaModal?.id)">
                        <button type="submit" class="btn-primary" :disabled="!respuestaSeleccionada">
                            Responder
                        </button>
                    </template>
                    <template x-if="esPreguntaCompletada(preguntaActivaParaModal?.id)">
                        <button type="button" class="btn-primary" @click="cerrarModalPregunta">
                            Continuar
                        </button>
                    </template>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Resultados Categoría -->
    <div class="alpine-overlay" x-show="mostrarResultados" x-transition>
        <div class="popup resultados" @click.away="cerrarResultados">
            <a class="close" href="#" @click.prevent="cerrarResultados">&times;</a>
            <h2>Resultados del Satélite</h2>

            <img :src="calcularCorrectas(categoriaActivaParaModal) > (categoriaActivaParaModal?.preguntas.length / 2) ? 'images/02.webp' : 'images/soso.webp'"
                alt="Emoji resultado" onerror="this.src='https://via.placeholder.com/150'">

            <div class="score">
                <span x-text="calcularCorrectas(categoriaActivaParaModal)"></span> / <span
                    x-text="categoriaActivaParaModal?.preguntas.length"></span>
            </div>
            <p>Preguntas Correctas</p>

            <button class="btn-primary" @click="cerrarResultados">Siguiente Destino</button>
        </div>
    </div>

    <!-- Modal Reto Final -->
    <div class="alpine-overlay" x-show="mostrarRetoPopup" x-transition>
        <div class="popup" @click.away="mostrarRetoPopup = false">
            <a class="close" href="#" @click.prevent="mostrarRetoPopup = false">&times;</a>
            <h2 x-text="retoActivoParaModal?.nombre" style="color: #ffcc00;"></h2>
            <p x-text="retoActivoParaModal?.descripcion"></p>

            <template x-if="respuestasUsuario['aprobado_reto_' + asignaturaActiva]">
                <div style="margin-top: 15px; color: #8cc63f; font-weight: bold;">
                    ✅ Reto superado con éxito. ¡Ruta desbloqueada!
                </div>
            </template>

            <button class="btn-primary" @click="mostrarRetoPopup = false">Continuar</button>
        </div>
    </div>

    <!-- Modal Resultados Reto -->
    <div class="alpine-overlay" x-show="mostrarResultadosReto" x-transition>
        <div class="popup resultados" @click.away="cerrarResultadosReto">
            <a class="close" href="#" @click.prevent="cerrarResultadosReto">&times;</a>
            <h2>Resultados del Reto Final</h2>

            <img :src="resultadoRetoActual?.aprobado ? 'images/02.webp' : 'images/soso.webp'"
                alt="Emoji resultado" onerror="this.src='https://via.placeholder.com/150'">

            <div class="score">
                <span x-text="resultadoRetoActual?.correctas"></span> / <span
                    x-text="resultadoRetoActual?.total"></span>
            </div>
            <p x-text="`Nota: ${resultadoRetoActual?.porcentaje}%`"></p>

            <template x-if="resultadoRetoActual?.aprobado">
                <p style="color: #8cc63f; font-weight: bold;">¡Felicidades! Has desbloqueado el siguiente destino.</p>
            </template>
            <template x-if="!resultadoRetoActual?.aprobado">
                <p style="color: #ff3c3c; font-weight: bold;">No has alcanzado el mínimo del 75%. Inténtalo de nuevo.</p>
            </template>

            <button class="btn-primary" @click="cerrarResultadosReto" x-text="resultadoRetoActual?.aprobado ? 'Siguiente Destino' : 'Reintentar'"></button>
        </div>
    </div>

    <!-- Modal Video de Transición -->
    <div class="alpine-overlay" x-show="mostrarVideoTransicion" x-transition
        style="z-index: 2000; display: flex; align-items: center; justify-content: center;">
        <div class="popup"
            style="width: 95%; max-width: 1200px; padding: 20px; background: #0e1628; display: flex; flex-direction: column; align-items: center;">
            <div
                style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="font-size: 1.2rem; margin: 0;">Transmisión Entrante...</h2>
                <button class="btn-primary" @click="toggleMuteVideo" style="padding: 5px 15px; font-size: 0.9rem;">
                    <span x-text="videoMuted ? 'Silenciar' : 'Activar Sonido'"></span>
                </button>
            </div>
            <video x-ref="videoTransicion"
                style="width: 100%; max-height: 80vh; border-radius: 8px; border: 2px solid #334155; outline: none; background: #000; pointer-events: none;"
                @ended="finalizarVideoTransicion" :muted="videoMuted" :src="videoUrlTransicion">
                Tu navegador no soporta el formato de video.
            </video>
        </div>
    </div>

    <script>
        function dashboardData() {
            return {
                menuAbierto: false,
                asignaturaActiva: 'matematicas',
                asignaturas: [],
                cargando: true,

                respuestasUsuario: {}, // { 'preguntaId': { respuesta: 'a', esCorrecta: true } }

                mostrarInfoPlaneta: false,
                planetaActivoModal: null,

                mostrarCategoriaPopup: false,
                categoriaActivaParaModal: null,
                catIdxParaModal: -1,

                mostrarPreguntaPopup: false,
                preguntaActivaParaModal: null,
                respuestaSeleccionada: null,

                mostrarResultados: false,
                
                mostrarRetoPopup: false,
                retoActivoParaModal: null,
                mostrarResultadosReto: false,
                resultadoRetoActual: null,

                mostrarVideoTransicion: false,
                siguienteAsignaturaPendiente: null,
                videoMuted: false,
                videoUrlTransicion: 'videos/prueba.webm',

                async init() {
                    try {
                        const materias = ['matematicas', 'lectura', 'ciencias', 'ciudadanas', 'ingles'];
                        const promesas = materias.map(materia => fetch(`data/${materia}.json`).then(res => res.json()));
                        this.asignaturas = await Promise.all(promesas);

                        // Mirar la URL para ver si hay un hash
                        this.manejarRutaUrl();

                        this.cargando = false;

                        // Estar atentos a cambios en la URL (Back/Forward)
                        window.addEventListener('hashchange', () => {
                            this.manejarRutaUrl();
                        });

                    } catch (error) {
                        console.error("Error cargando los datos JSON:", error);
                    }
                },

                manejarScroll(event) {
                    if (event.deltaY !== 0) {
                        event.preventDefault();
                        this.$refs.mapContainer.scrollLeft += event.deltaY;
                    }
                },

                manejarRutaUrl() {
                    const hash = window.location.hash.replace('#/', '');
                    if (hash && this.asignaturas.find(a => a.id === hash)) {
                        this.asignaturaActiva = hash;
                    } else if (this.asignaturas.length > 0) {
                        this.asignaturaActiva = this.asignaturas[0].id;
                        window.location.hash = `/${this.asignaturaActiva}`;
                    }
                    // Resetear el scroll horizontal al cambiar de materia
                    setTimeout(() => {
                        if (this.$refs.mapContainer) this.$refs.mapContainer.scrollLeft = 0;
                    }, 100);
                },

                seleccionarAsignatura(id) {
                    this.asignaturaActiva = id;
                    this.menuAbierto = false;
                    window.location.hash = `/${id}`; // Actualiza la URL independientemente
                },

                get asignaturaSeleccionada() {
                    if (this.cargando || this.asignaturas.length === 0) return null;
                    return this.asignaturas.find(a => a.id === this.asignaturaActiva) || this.asignaturas[0];
                },

                get puntosTotalesMateria() {
                    if (!this.asignaturaSeleccionada) return 0;
                    let puntos = 0;
                    this.asignaturaSeleccionada.categorias.forEach(cat => {
                        cat.preguntas.forEach(preg => {
                            if (this.respuestasUsuario[preg.id]?.esCorrecta) {
                                puntos++;
                            }
                        });
                    });
                    return puntos;
                },

                get totalPreguntasMateria() {
                    if (!this.asignaturaSeleccionada) return 1;
                    let total = 0;
                    this.asignaturaSeleccionada.categorias.forEach(cat => {
                        total += cat.preguntas.length;
                    });
                    return total === 0 ? 1 : total;
                },

                get porcentajeProgreso() {
                    let totalRespondidas = 0;
                    if (!this.asignaturaSeleccionada) return 0;
                    this.asignaturaSeleccionada.categorias.forEach(cat => {
                        cat.preguntas.forEach(preg => {
                            if (this.respuestasUsuario[preg.id] !== undefined) {
                                totalRespondidas++;
                            }
                        });
                    });
                    return (totalRespondidas / this.totalPreguntasMateria) * 100;
                },

                esPreguntaCompletada(id) {
                    return this.respuestasUsuario[id] !== undefined;
                },

                esPreguntaActiva(catIdx, pregIdx) {
                    // La primera pregunta de una categoría activa está activa
                    if (pregIdx === 0) return true;
                    const cat = this.asignaturaSeleccionada.categorias[catIdx];
                    const prevPregId = cat.preguntas[pregIdx - 1].id;
                    return this.esPreguntaCompletada(prevPregId);
                },

                esCategoriaCompletada(catIdx) {
                    if (catIdx < 0) return true;
                    const cat = this.asignaturaSeleccionada.categorias[catIdx];
                    return cat.preguntas.every(p => this.esPreguntaCompletada(p.id));
                },

                esAsignaturaCompletada() {
                    if (!this.asignaturaSeleccionada) return false;
                    return this.asignaturaSeleccionada.categorias.every((_, idx) => this.esCategoriaCompletada(idx));
                },

                // Gerenación del array lineal para renderizar el camino visual (Planeta -> Satelites -> Asteroides)
                get rutaCompleta() {
                    if (!this.asignaturaSeleccionada) return [];
                    let ruta = [];

                    // 1. Planeta Principal
                    ruta.push({
                        tipo: 'planeta',
                        id: `planeta_${this.asignaturaSeleccionada.id}`,
                        datos: this.asignaturaSeleccionada,
                        bloqueado: false
                    });

                    // 2. Satélites y Asteroides
                    this.asignaturaSeleccionada.categorias.forEach((cat, catIdx) => {
                        let catBloqueada = catIdx > 0 ? !this.esCategoriaCompletada(catIdx - 1) : false;

                        ruta.push({
                            tipo: 'satelite',
                            id: cat.id,
                            datos: cat,
                            catIdx: catIdx,
                            bloqueado: catBloqueada
                        });

                        cat.preguntas.forEach((preg, pregIdx) => {
                            let pregBloqueada = catBloqueada || (!this.esPreguntaActiva(catIdx, pregIdx) && !this.esPreguntaCompletada(preg.id));
                            ruta.push({
                                tipo: 'asteroide',
                                id: preg.id,
                                datos: preg,
                                catIdx: catIdx,
                                pregIdx: pregIdx,
                                bloqueado: pregBloqueada
                            });
                        });
                    });

                    // 3. Reto Final (Agujero de Gusano / Portal)
                    let retoCompletadoYAprobado = false;
                    if (this.asignaturaSeleccionada.retoFinal) {
                        const reto = this.asignaturaSeleccionada.retoFinal;
                        let retoBloqueado = !this.esAsignaturaCompletada(); 
                        const retoId = `reto_${this.asignaturaSeleccionada.id}`;
                        reto.id = retoId;
                        
                        retoCompletadoYAprobado = this.respuestasUsuario[`aprobado_${retoId}`] === true;

                        ruta.push({
                            tipo: 'reto_final',
                            id: retoId,
                            datos: reto,
                            bloqueado: retoBloqueado,
                            completado: retoCompletadoYAprobado
                        });
                        
                        reto.preguntas.forEach((preg, pregIdx) => {
                            let prevCompleted = pregIdx === 0 ? true : this.esPreguntaCompletada(reto.preguntas[pregIdx - 1].id);
                            let pregBloqueada = retoBloqueado || (!prevCompleted && !this.esPreguntaCompletada(preg.id));
                            
                            ruta.push({
                                tipo: 'asteroide_reto',
                                id: preg.id,
                                datos: preg,
                                pregIdx: pregIdx,
                                bloqueado: pregBloqueada,
                                esReto: true
                            });
                        });
                    }

                    // 4. Planeta Final de Ruta
                    const isAsignaturaCompletadaTotalmente = this.asignaturaSeleccionada.retoFinal ? retoCompletadoYAprobado : this.esAsignaturaCompletada();
                    const idxMateria = this.asignaturas.findIndex(a => a.id === this.asignaturaSeleccionada.id);
                    if (idxMateria < this.asignaturas.length - 1) {
                        const nextMateria = this.asignaturas[idxMateria + 1];
                        ruta.push({
                            tipo: 'planeta_bloqueado',
                            id: `planeta_next_${nextMateria.id}`,
                            datos: nextMateria,
                            bloqueado: !isAsignaturaCompletadaTotalmente
                        });
                    } else {
                        ruta.push({
                            tipo: 'planeta_final',
                            id: `planeta_final`,
                            bloqueado: !isAsignaturaCompletadaTotalmente
                        });
                    }

                    return ruta;
                },

                abrirPlaneta(nodo) {
                    this.planetaActivoModal = nodo.datos;
                    this.mostrarInfoPlaneta = true;
                },

                abrirCategoria(nodo) {
                    this.categoriaActivaParaModal = nodo.datos;
                    this.catIdxParaModal = nodo.catIdx;
                    this.mostrarCategoriaPopup = true;
                },

                abrirReto(nodo) {
                    this.retoActivoParaModal = nodo.datos;
                    this.mostrarRetoPopup = true;
                },

                abrirPregunta(nodo) {
                    this.preguntaActivaParaModal = nodo;
                    const r = this.respuestasUsuario[nodo.id];
                    this.respuestaSeleccionada = r ? r.respuesta : null;
                    this.mostrarPreguntaPopup = true;
                },

                enviarRespuesta() {
                    if (!this.respuestaSeleccionada) return;

                    const pregInfo = this.preguntaActivaParaModal;
                    const pId = pregInfo.id;
                    const esCorr = (this.respuestaSeleccionada === pregInfo.datos.respuestaCorrecta);

                    if (!this.esPreguntaCompletada(pId)) {
                        this.respuestasUsuario[pId] = {
                            respuesta: this.respuestaSeleccionada,
                            esCorrecta: esCorr
                        };
                    }

                    // Cerrar el modal actual después de un segundo si es correcta
                    if (esCorr) {
                        setTimeout(() => {
                            this.cerrarModalPregunta();
                        }, 1500);
                    }
                },

                cerrarModalPregunta() {
                    this.mostrarPreguntaPopup = false;
                    if (this.preguntaActivaParaModal) {
                        if (this.preguntaActivaParaModal.esReto) {
                            this.verificarFinReto();
                        } else {
                            this.verificarFinCategoria(this.preguntaActivaParaModal.catIdx);
                        }
                    }
                },

                cerrarModalPreguntaPorAway() {
                    // Si ya está completada, podemos cerrarla normalmente como Continuar
                    if (this.preguntaActivaParaModal && this.esPreguntaCompletada(this.preguntaActivaParaModal.id)) {
                        this.cerrarModalPregunta();
                    } else {
                        // Si no ha respondido, simplemente se cierra el modal
                        this.mostrarPreguntaPopup = false;
                    }
                },

                verificarFinCategoria(catIdx) {
                    const cat = this.asignaturaSeleccionada.categorias[catIdx];
                    const completadas = cat.preguntas.every(p => this.esPreguntaCompletada(p.id));

                    // Si justo ahora se completó
                    if (completadas && !this.categoriaYaMostroResultados(cat.id)) {
                        this.categoriaActivaParaModal = cat;
                        this.mostrarResultados = true;
                        // Marcar que ya vimos resultados para no volverlo a mostrar
                        this.respuestasUsuario[`resultado_${cat.id}`] = true;
                    } else {
                        // Hacer un scroll suave al siguiente elemento desbloqueado en el mapa
                        this.scrollAlSiguiente();
                    }
                },

                categoriaYaMostroResultados(catId) {
                    return this.respuestasUsuario[`resultado_${catId}`] === true;
                },

                calcularCorrectas(cat) {
                    if (!cat) return 0;
                    let corr = 0;
                    cat.preguntas.forEach(p => {
                        if (this.respuestasUsuario[p.id]?.esCorrecta) corr++;
                    });
                    return corr;
                },

                cerrarResultados() {
                    this.mostrarResultados = false;
                    this.scrollAlSiguiente();
                },

                verificarFinReto() {
                    const reto = this.asignaturaSeleccionada.retoFinal;
                    if (!reto) return;
                    
                    const retoId = `reto_${this.asignaturaSeleccionada.id}`;
                    const completadas = reto.preguntas.every(p => this.esPreguntaCompletada(p.id));

                    if (completadas && !this.respuestasUsuario[`resultado_${retoId}`]) {
                        let correctas = 0;
                        reto.preguntas.forEach(p => {
                            if (this.respuestasUsuario[p.id]?.esCorrecta) correctas++;
                        });
                        
                        const porcentaje = (correctas / reto.preguntas.length) * 100;
                        const aprobado = porcentaje >= 75;
                        
                        this.resultadoRetoActual = { correctas, total: reto.preguntas.length, porcentaje, aprobado };
                        this.mostrarResultadosReto = true;
                        
                        // Si aprobó, se guarda permanentemente.
                        if (aprobado) {
                            this.respuestasUsuario[`aprobado_${retoId}`] = true;
                            this.respuestasUsuario[`resultado_${retoId}`] = true;
                        }
                    } else {
                        this.scrollAlSiguiente();
                    }
                },

                cerrarResultadosReto() {
                    this.mostrarResultadosReto = false;
                    const retoId = `reto_${this.asignaturaSeleccionada.id}`;
                    
                    if (!this.resultadoRetoActual.aprobado) {
                        const reto = this.asignaturaSeleccionada.retoFinal;
                        reto.preguntas.forEach(p => {
                            delete this.respuestasUsuario[p.id];
                        });
                        delete this.respuestasUsuario[`resultado_${retoId}`];
                        
                        setTimeout(() => {
                            const map = this.$refs.mapContainer;
                            if (map) {
                                map.scrollBy({ left: -600, behavior: 'smooth' });
                            }
                        }, 300);
                    } else {
                        this.scrollAlSiguiente();
                    }
                },

                avanzarSiguienteMateria(idSiguiente) {
                    this.siguienteAsignaturaPendiente = idSiguiente;
                    
                    // Determinar el número de video basado en el índice de la materia actual
                    const indexActual = this.asignaturas.findIndex(a => a.id === this.asignaturaActiva);
                    const numeroVideo = indexActual + 1; // 1 para la primera, 2 para la segunda, etc.
                    this.videoUrlTransicion = `videos/lore_${numeroVideo}.webm`;
                    
                    this.mostrarVideoTransicion = true;
                    setTimeout(() => {
                        if (this.$refs.videoTransicion) {
                            this.$refs.videoTransicion.load(); // Cargar la nueva URL
                            this.$refs.videoTransicion.currentTime = 0;
                            this.$refs.videoTransicion.play().catch(e => console.log("Auto-play prevenido", e));
                        }
                    }, 100);
                },

                finalizarVideoTransicion() {
                    this.mostrarVideoTransicion = false;
                    if (this.siguienteAsignaturaPendiente) {
                        this.seleccionarAsignatura(this.siguienteAsignaturaPendiente);
                        this.siguienteAsignaturaPendiente = null;
                    }
                },

                toggleMuteVideo() {
                    this.videoMuted = !this.videoMuted;
                },

                scrollAlSiguiente() {
                    setTimeout(() => {
                        // Buscar en el DOM el primer elemento bloqueado para hacerle scroll, 
                        // o simplemente avanzar un poco.
                        const map = this.$refs.mapContainer;
                        if (map) map.scrollBy({ left: 300, behavior: 'smooth' });
                    }, 300);
                }
            }
        }
    </script>
</body>
